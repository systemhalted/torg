# XcodeGen project for the torg iPad/iOS spike.
# Generate the Xcode project with:  xcodegen generate   (after ./build-rust.sh)
name: TorgSpike
options:
  bundleIdPrefix: com.systemhalted.torg
  deploymentTarget:
    iOS: "17.0"
targets:
  TorgSpike:
    type: application
    platform: iOS
    sources:
      - path: TorgSpike
      - path: Generated/torg_ffi.swift
    dependencies:
      # Static library xcframework built by build-rust.sh — linked, not embedded.
      - framework: TorgFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.systemhalted.torg.spike
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
