name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install aarch64 Linux linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release -p textr-org-tui --target "$TARGET"
        env:
          TARGET: ${{ matrix.target }}
      - name: Package tarball
        id: pkg
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          name="torg-${GITHUB_REF_NAME}-${TARGET}"
          dir="target/${TARGET}/release"
          strip "$dir/torg" 2>/dev/null || true   # host strip may not handle a cross target
          tar -C "$dir" -czf "${name}.tar.gz" torg
          if command -v sha256sum >/dev/null; then
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          else
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi
          echo "asset=${name}.tar.gz" >> "$GITHUB_OUTPUT"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256

  deb:
    name: Debian package ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: deb-${{ matrix.target }}
      - name: Install aarch64 Linux linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb
        run: cargo deb -p textr-org-tui --target "$TARGET" --output "torg-${TARGET}.deb"
        env:
          TARGET: ${{ matrix.target }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: torg-${{ matrix.target }}.deb

  homebrew:
    name: Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    env:
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Render formula from the released macOS tarballs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bare="${GITHUB_REF_NAME#v}"
          arm="torg-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
          intel="torg-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz"
          gh release download "$GITHUB_REF_NAME" -R "$GITHUB_REPOSITORY" -p "$arm" -p "$intel" --clobber
          sha_arm="$(sha256sum "$arm" | cut -d' ' -f1)"
          sha_intel="$(sha256sum "$intel" | cut -d' ' -f1)"
          sed -e "s|@VERSION@|${bare}|g" \
              -e "s|@TAG@|${GITHUB_REF_NAME}|g" \
              -e "s|@REPO@|${GITHUB_REPOSITORY}|g" \
              -e "s|@SHA_ARM@|${sha_arm}|g" \
              -e "s|@SHA_INTEL@|${sha_intel}|g" \
              packaging/homebrew/torg.rb.tmpl > torg.rb
      - name: Attach formula to release
        uses: softprops/action-gh-release@v2
        with:
          files: torg.rb
      - name: Push formula to the Homebrew tap
        if: env.HAS_TAP_TOKEN == 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp torg.rb tap/Formula/torg.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/torg.rb
          git commit -m "torg ${GITHUB_REF_NAME}" || { echo "formula unchanged"; exit 0; }
          git push
